<svg xmlns="http://www.w3.org/2000/svg" viewBox="36 68 110 88" width="220" height="176" role="img" aria-label="MODELOUNGE symbol">
  <!-- 모드라운지 심볼 · 1-a 솔리드 팬(교차 회전 프레임 5장, 0/-9/-18/-27/-36°). 빈칸은 마스크로 투명 → 배경 비침. 채움=잉크. -->
  <defs>
    <mask id="fan" maskUnits="userSpaceOnUse" x="0" y="0" width="200" height="200">
      <rect x="62" y="72" width="80" height="80" fill="#fff"/>
      <rect x="62" y="86" width="66" height="66" transform="rotate(-9 62 152)" fill="#000"/>
      <rect x="62" y="98" width="54" height="54" transform="rotate(-18 62 152)" fill="#fff"/>
      <rect x="62" y="108" width="44" height="44" transform="rotate(-27 62 152)" fill="#000"/>
      <rect x="62" y="116" width="36" height="36" transform="rotate(-36 62 152)" fill="#fff"/>
    </mask>
  </defs>
  <rect x="0" y="0" width="200" height="200" fill="#16130F" mask="url(#fan)"/>
</svg>
