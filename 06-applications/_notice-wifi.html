<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:560px;height:770px;overflow:hidden;background:transparent;}
  .poster{width:560px;height:770px;background:#ffffff;border:3px solid #16130F;
    display:flex;flex-direction:column;align-items:center;font-family:'Paperlogy';color:#16130F;
    padding:70px 40px 60px;}
  .title{font-weight:900;font-size:132px;letter-spacing:.02em;line-height:1;}
  .pic{flex:1;display:flex;align-items:center;justify-content:center;}
  .pic svg{width:250px;height:auto;color:#16130F;}
  .info{font-weight:500;font-size:36px;line-height:1.5;text-align:center;letter-spacing:0;}
</style></head><body>
<div class="poster">
  <div class="title">WIFI</div>
  <div class="pic">
    <svg viewBox="0 0 100 70" role="img" aria-label="WIFI">
      <g fill="none" stroke="#16130F" stroke-width="7" stroke-linecap="round">
        <path d="M40,50 Q50,40 60,50"/>
        <path d="M30,42 Q50,22 70,42"/>
        <path d="M20,34 Q50,6 80,34"/>
      </g>
      <circle cx="50" cy="63" r="5.5" fill="#16130F"/>
    </svg>
  </div>
  <div class="info">ID : modlounge<br>PW : 1283204&amp;Dk</div>
</div>
</body></html>
